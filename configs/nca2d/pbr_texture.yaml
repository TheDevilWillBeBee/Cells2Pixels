experiment_name: "PBRTexture"
task: "texture_2d"
device: "cuda:0"

nca:
  type: "NCA"
  graft_initialization: null
  output_type: "s" # "s" or "z". Whether to pass the state or perception to SIREN

  nca_kwargs:
    channels: 16 # Number of nca channels
    fc_dim: 128 # Number of neurons in the hidden layer

siren:
  hidden_features: 32 # Number of neurons in the hidden layer of the SIREN decoder
  hidden_layers: 2 # Number of hidden layers in the SIREN decoder
  outermost_linear: True # Whether to use a linear layer at the output of the SIREN decoder
  fx: "linear" # The preactivation function before the sin. ["linear", "finer", "sinh"]
  activation: "sin"
  num_frequencies: 0 # Number of frequencies in the SIREN decoder
  first_omega_0: 10.0
  hidden_omega_0: 10.0

train:
  epochs: 3000 # Number of epochs
  batch_size: 2 # Batch size
  lr: 0.001 # Learning rate
  lr_decay_steps: [ 1000, 2000 ] # Learning rate decay steps
  lr_decay_gamma: 0.3 # Learning rate decay factor
  pbr_training: True
  num_repetitions: 4 # Number of times to repeat the training loop

  #### NCA related configs ####
  nca_grid_size: [ 128, 128 ] # Size of the grid for the NCA.
  pool_size: 512 # Number of samples in the pool. Pool is used to improve long-term stability of MeshNCA
  inject_seed_interval: 32 # Number of steps after which a seed state is injected into the pool
  step_range: [ 32, 128 ] # Number of update steps during training is sampled randomly from this range

  summary_interval: 250 # Interval for logging the training summary

renderer:
  scale_factor: 8 # Scale factor for the renderer. The final resolution will be (nca_grid_size * scale_factor)
  padding: "circular" # This should ideally be the same as the padding used in the NCA.
  ambient_light: 0.5 # Ambient light intensity
  point_light: 0.7 # Directional light intensity
  fs_shader: "vanilla" # The fragment shader to use. Either "vanilla" or "simple" or "pbr"

num_channels:
  {
    # Number of channels in the model to assign to each target image
    "albedo": 3,
    "normal": 3,
    "hra": 3
  }
loss:
  overflow_loss_weight: 100.0 # Weight of the overflow loss
  appearance_loss_weight: 2.0 # Weight of the style loss
  motion_loss_weight: 0 # Weight of the motion loss

  motion_loss_kwargs:
    loss_type: "vector_field" # Type of the motion loss. Options: "vector_field", "video"
    target_name: "circular" # Type of the vector field for the motion loss.
    strength_loss_weight: 1.5 # Weight of the strength loss
    direction_loss_weight: 1.0 # Weight of the direction loss
    image_size: [ 128, 128 ] # The images will be resized to this size before passing to the optic flow model
    base_num_steps: 24 # This kind of determines the number of NCA steps per frame.

  #### Appearance loss used for image-guided training. Mostly based on VGG features ####
  appearance_loss_kwargs:
    target_image_size: [ 1024, 1024 ] # Resolution for loading the target images
    patch_size: [ 256, 256 ] # Crops from the generated images will be resized to this size before passing to VGG
    num_scales: 3 # Number of scales to be used for the style loss
    relative_scale: 1 # Relative scale of the target image to the generated image. 1.0 = same size, 2.0 = twice the size
    max_image_size: [ 2048, 2048 ] # Images larger than this size will be center cropped (Used to avoid OOM errors when relative scale is large)
    target_images_path:
      {
        # Paths to the target images for the appearance loss. The keys should correspond to the keys in num_channels
        "albedo": "data/pbr_textures/Waffle_001/albedo.jpg",
        "normal": "data/pbr_textures/Waffle_001/normal.jpg",
        "hra": "data/pbr_textures/Waffle_001/hra.jpg"
      }
    # Number of channels in the target images
    include_image_as_feature: False
    num_pseudo_targets: 10
    vgg_layers: [ 1, 6, 11, 18, 25 ] # VGG layers to be used for the style loss
    # Uncomment the following lines to enable the autocorrelation loss
    # ac_loss_weight: 10.0
    # ac_loss_kwargs:
    #   layers: [ 0, 1, 2 ] # Use all layers
    #   reduction: "l1"

logger:
  backend: local
